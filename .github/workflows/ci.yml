name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js with pnpm store cache
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Verify dependency boundaries
        run: pnpm test:boundaries

      - name: Type-check
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  containers:
    name: Container definitions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build API image
        run: docker build --file apps/api/Dockerfile --tag airline-manager-api:ci .

      - name: Build worker image
        run: docker build --file apps/worker/Dockerfile --tag airline-manager-worker:ci .

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan Git history with Gitleaks
        run: >-
          docker run --rm --volume "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.27.0 git /repo --redact
          --no-banner
