packages:
  - apps/*
  - packages/*

saveExact: true
strictPeerDependencies: true
injectWorkspacePackages: true

allowBuilds:
  esbuild: true
  msgpackr-extract: false
  sharp: true
  unrs-resolver: true

catalog:
  "@types/node": 24.13.3
  typescript: 6.0.3
  vitest: 4.1.10

minimumReleaseAgeExclude:
  - "@eslint/eslintrc@3.3.6"
  - "@eslint/js@9.39.5"
  - eslint@9.39.5
