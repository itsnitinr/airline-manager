name: airline-manager

services:
  postgres:
    image: postgres:18.3-bookworm
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-airline_manager}
      POSTGRES_USER: ${POSTGRES_USER:-airline_manager}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-airline_manager_local_only}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    stop_grace_period: 30s
    restart: unless-stopped

  redis:
    image: redis:8.2.7-bookworm
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    stop_grace_period: 30s
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:v1.30.0
    expose:
      - "1025"
    ports:
      - "127.0.0.1:${MAILPIT_WEB_PORT:-8025}:8025"
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: packages/database/Dockerfile.migrate
    environment:
      MIGRATION_DATABASE_URL: postgresql://${POSTGRES_USER:-airline_manager}:${POSTGRES_PASSWORD:-airline_manager_local_only}@postgres:5432/${POSTGRES_DB:-airline_manager}
      DATABASE_APPLICATION_NAME: airline-manager-migration
      DATABASE_POOL_MAX: 1
    depends_on:
      postgres:
        condition: service_healthy
    init: true
    restart: "no"

  catalog-seed:
    build:
      context: .
      dockerfile: packages/database/Dockerfile.migrate
    command: ["node", "dist/cli/catalog-seed.js"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-airline_manager}:${POSTGRES_PASSWORD:-airline_manager_local_only}@postgres:5432/${POSTGRES_DB:-airline_manager}
      DATABASE_APPLICATION_NAME: airline-manager-catalog-seed
      DATABASE_POOL_MAX: 1
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    init: true
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-airline_manager}:${POSTGRES_PASSWORD:-airline_manager_local_only}@postgres:5432/${POSTGRES_DB:-airline_manager}
      DATABASE_APPLICATION_NAME: airline-manager-api
      DATABASE_POOL_MAX: ${API_DATABASE_POOL_MAX:-20}
      REDIS_URL: redis://redis:6379
      API_CORS_ORIGINS: ${API_CORS_ORIGINS:-http://localhost:3000}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      AUTH_EMAIL_SMTP_HOST: mailpit
      AUTH_EMAIL_SMTP_PORT: 1025
      AUTH_EMAIL_SMTP_SECURE: "false"
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM:-Airline Manager <no-reply@airline-manager.test>}
      AUTH_EMAIL_SMTP_USERNAME: ${AUTH_EMAIL_SMTP_USERNAME:-}
      AUTH_EMAIL_SMTP_PASSWORD: ${AUTH_EMAIL_SMTP_PASSWORD:-}
    ports:
      - "127.0.0.1:${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      catalog-seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    init: true
    stop_grace_period: 30s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      WORKER_HEALTH_HOST: 0.0.0.0
      WORKER_HEALTH_PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-airline_manager}:${POSTGRES_PASSWORD:-airline_manager_local_only}@postgres:5432/${POSTGRES_DB:-airline_manager}
      DATABASE_APPLICATION_NAME: airline-manager-worker
      DATABASE_POOL_MAX: ${WORKER_DATABASE_POOL_MAX:-10}
      REDIS_URL: redis://redis:6379
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-8}
      WORKER_DRAIN_MILLISECONDS: ${WORKER_DRAIN_MILLISECONDS:-25000}
      WORKER_POLL_MILLISECONDS: ${WORKER_POLL_MILLISECONDS:-1000}
    ports:
      - "127.0.0.1:${WORKER_HEALTH_PORT:-3002}:3002"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      catalog-seed:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    init: true
    stop_grace_period: 60s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      API_INTERNAL_URL: http://api:3001
      NEXT_PUBLIC_MAP_STYLE_URL: ${NEXT_PUBLIC_MAP_STYLE_URL:-}
      MAP_TEST_HARNESS: enabled
    ports:
      - "127.0.0.1:${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy
    init: true
    stop_grace_period: 30s
    develop:
      watch:
        - action: sync
          path: apps/web
          target: /workspace/apps/web
          ignore:
            - .next/
            - node_modules/
        - action: sync
          path: packages
          target: /workspace/packages
          ignore:
            - "**/dist/"
            - "**/node_modules/"
        - action: rebuild
          path: package.json
        - action: rebuild
          path: pnpm-lock.yaml

volumes:
  postgres-data:
  redis-data:
